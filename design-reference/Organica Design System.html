  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

adius:20px; background:rgba(0,0,0,0.06);\">Shop<\u002Fspan>\n                <span style=\"font-size:14px; color:#1a1a1a; padding:6px 13px; border-radius:20px;\">Science<\u002Fspan>\n                <span style=\"font-size:14px; color:#1a1a1a; padding:6px 13px; border-radius:20px;\">Learn<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ============ VOICE ============ -->\n      <section id=\"voice\" style=\"scroll-margin-top:30px; margin-top:72px;\">\n        <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:6px;\">\n          <span class=\"ds-mono\" style=\"font-size:11px; color:#62e104; font-weight:700;\">08<\u002Fspan>\n          <h2 style=\"font-size:24px; font-weight:400; letter-spacing:-0.02em;\">Signature<\u002Fh2>\n        <\u002Fdiv>\n        <p style=\"font-size:14px; color:#5e5e5e; max-width:520px; margin-bottom:26px;\">A full-width lowercase wordmark in League Spartan Bold, set as a low-opacity watermark with a slow light sweep — used sparingly to close key moments.<\u002Fp>\n        <div style=\"position:relative; padding:28px 36px; border-radius:18px; overflow:hidden; background:radial-gradient(70% 120% at 50% 0%,#4a6b3a,#2e4a25 60%,#1f3219 100%); display:flex; align-items:center; justify-content:center;\">\n          <svg viewBox=\"0 0 1000 122\" width=\"100%\" preserveAspectRatio=\"xMidYMid meet\" style=\"display:block;\" aria-label=\"nature is our thing\">\n            <defs><linearGradient id=\"natureShine\" x1=\"0\" y1=\"0\" x2=\"0.35\" y2=\"0\"><stop offset=\"0\" stop-color=\"#fcfcf7\" stop-opacity=\"0.26\"><\u002Fstop><stop offset=\"0.5\" stop-color=\"#fcfcf7\" stop-opacity=\"0.62\"><\u002Fstop><stop offset=\"1\" stop-color=\"#fcfcf7\" stop-opacity=\"0.26\"><\u002Fstop><animateTransform attributeName=\"gradientTransform\" type=\"translate\" values=\"-0.6 0;1 0;-0.6 0\" keyTimes=\"0;0.5;1\" calcMode=\"spline\" keySplines=\"0.45 0 0.2 1;0.45 0 0.2 1\" dur=\"7s\" repeatCount=\"indefinite\"><\u002FanimateTransform><\u002FlinearGradient><\u002Fdefs><text x=\"500\" y=\"91\" text-anchor=\"middle\" textLength=\"980\" lengthAdjust=\"spacingAndGlyphs\" font-family=\"'League Spartan',sans-serif\" font-weight=\"700\" font-size=\"128\" letter-spacing=\"-3\" fill=\"url(#natureShine)\">nature is our thing<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <footer style=\"border-top:1px solid rgba(0,0,0,0.08);\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:24px 40px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;\">\n      <div class=\"ds-mono\" style=\"font-size:11px; color:#8a8a80; letter-spacing:.5px;\">ORGANICA LIVING — DESIGN SYSTEM v1.0<\u002Fdiv>\n      <div style=\"font-size:12px; color:#8a8a80;\">© 2026 Organica Living, Inc.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() { this.wire(); }\n  componentDidUpdate() { this.wire(); }\n  wire() {\n    const root = this.refs && this.refs.root; if (!root) return;\n\n    // rail links hover\n    root.querySelectorAll('[data-railink]').forEach(a => {\n      if (a.dataset.w) return; a.dataset.w = '1';\n      a.addEventListener('mouseenter', () => { a.style.background = 'rgba(0,0,0,0.05)'; a.style.color = '#1a1a1a'; });\n      a.addEventListener('mouseleave', () => { a.style.background = 'transparent'; a.style.color = '#5e5e5e'; });\n    });\n\n    // swatch hover lift\n    root.querySelectorAll('[data-sw]').forEach(s => {\n      if (s.dataset.w) return; s.dataset.w = '1';\n      if (s.querySelector('[data-copy]')) {\n        s.addEventListener('mouseenter', () => { s.style.transform = 'translateY(-3px)'; s.style.boxShadow = '0 14px 30px rgba(28,58,19,0.14)'; });\n        s.addEventListener('mouseleave', () => { s.style.transform = 'translateY(0)'; s.style.boxShadow = 'none'; });\n      }\n    });\n\n    // product card lift + jar scale\n    root.querySelectorAll('[data-prodcard]').forEach(card => {\n      if (card.dataset.w) return; card.dataset.w = '1';\n      const jar = card.querySelector('[data-jar]');\n      card.style.transition = 'transform .3s cubic-bezier(0.75,0,0.25,1), box-shadow .3s ease';\n      card.addEventListener('mouseenter', () => { card.style.transform = 'translateY(-6px)'; card.style.boxShadow = '0 22px 50px rgba(28,58,19,0.3)'; if (jar) jar.style.transform = 'scale(1.08)'; });\n      card.addEventListener('mouseleave', () => { card.style.transform = 'translateY(0)'; card.style.boxShadow = 'none'; if (jar) jar.style.transform = 'scale(1)'; });\n    });\n\n    // nav rows\n    root.querySelectorAll('[data-navrow]').forEach(r => {\n      if (r.dataset.w) return; r.dataset.w = '1';\n      r.addEventListener('mouseenter', () => { r.style.background = 'rgba(0,0,0,0.05)'; });\n      r.addEventListener('mouseleave', () => { r.style.background = 'transparent'; });\n    });\n\n    // pill buttons: lift / fill / arrow nudge\n    root.querySelectorAll('a,button').forEach(b => {\n      if (b.dataset.w) return;\n      const s = b.getAttribute('style') || '';\n      // match React-serialized styles too (it inserts a space: \"border-radius: 50%\")\n      if (!/border-radius:\\s*(40px|50%)/.test(s)) return;\n      b.dataset.w = '1';\n      const cs = getComputedStyle(b);\n      const bg = cs.backgroundColor; const col = cs.color;\n      const transparent = (bg === 'rgba(0, 0, 0, 0)' || bg === 'transparent');\n      const m = (col.match(/\\d+/g) || ['255','255','255']).map(Number);\n      const lightText = (0.299*m[0] + 0.587*m[1] + 0.114*m[2]) > 140;\n      const arrow = b.querySelector('[data-arrow]');\n      b.style.transition = 'background .25s cubic-bezier(0.75,0,0.25,1), color .25s ease, transform .22s cubic-bezier(0.75,0,0.25,1), box-shadow .25s ease, filter .25s ease';\n      const enter = () => {\n        b.style.transform = arrow ? 'none' : 'translateY(-2px)';\n        if (transparent) {\n          if (lightText) { b.style.background = '#fcfcf7'; b.style.color = '#1c3a13'; }\n          else { b.style.background = '#1c3a13'; b.style.color = '#fcfcf7'; }\n          b.style.boxShadow = '0 10px 26px rgba(28,58,19,0.16)';\n        } else { b.style.filter = 'brightness(1.1)'; b.style.boxShadow = '0 12px 28px rgba(28,58,19,0.22)'; }\n      };\n      const leave = () => {\n        b.style.transform = arrow ? 'none' : 'translateY(0)'; b.style.filter = 'none'; b.style.boxShadow = 'none';\n        if (transparent) { b.style.background = 'transparent'; b.style.color = col; }\n      };\n      b.addEventListener('mouseenter', enter);\n      b.addEventListener('mouseleave', leave);\n      b.addEventListener('mousedown', () => { b.style.transform = 'translateY(0) scale(0.96)'; });\n      b.addEventListener('mouseup', enter);\n    });\n\n    // unified smooth arrow nudge for every button / link / arrow host\n    root.querySelectorAll('[data-arrow]').forEach(arrow => {\n      const host = arrow.closest('a,button,[data-arrow-host]') || arrow.parentElement;\n      if (!host || host.dataset.aw) return; host.dataset.aw = '1';\n      arrow.style.transition = 'transform .3s cubic-bezier(0.33,1,0.68,1)';\n      const fwd = () => { arrow.style.transform = 'translateX(5px)'; };\n      const back = () => { arrow.style.transform = 'translateX(0)'; };\n      host.addEventListener('mouseenter', fwd);\n      host.addEventListener('mouseleave', back);\n      host.addEventListener('focus', fwd);\n      host.addEventListener('blur', back);\n    });\n  }\n  renderVals() {\n    const coreColors = [\n      { name:'Cream', hex:'#fcfcf7', token:'--bg-base', onColor:'#8a8a80' },\n      { name:'Forest', hex:'#1c3a13', token:'--green-900', onColor:'rgba(252,252,247,.7)' },\n      { name:'Electric Lime', hex:'#62e104', token:'--accent', onColor:'rgba(26,26,26,.6)' },\n      { name:'Ink', hex:'#1a1a1a', token:'--text', onColor:'rgba(252,252,247,.6)' },\n    ];\n    const scaleColors = [\n      { name:'Panel', hex:'#ececE9' },\n      { name:'Header', hex:'#f3f0e8' },\n      { name:'Sage', hex:'#cdd6c2' },\n      { name:'Moss', hex:'#B9C7B5' },\n      { name:'Olive', hex:'#92A48E' },\n      { name:'Pine', hex:'#2c4a35' },\n      { name:'Text Mute', hex:'#5e5e5e' },\n      { name:'Text Soft', hex:'#8a8a80' },\n      { name:'Line', hex:'#e3e1d8' },\n      { name:'Sand', hex:'#E7E1D2' },\n    ];\n    const typeScale = [\n      { spec:'SORA 300 · 58/clamp', family:\"'Sora',sans-serif\", size:'46px', weight:'300', tracking:'-0.03em', sample:'A health routine for your microbiome' },\n      { spec:'SORA 300 · 40', family:\"'Sora',sans-serif\", size:'32px', weight:'300', tracking:'-0.02em', sample:'Whole body health starts in the gut' },\n      { spec:'SORA 500 · 22', family:\"'Sora',sans-serif\", size:'22px', weight:'500', tracking:'-0.01em', sample:'Daily Synbiotic DS-01®' },\n      { spec:'SPARTAN 400 · 16', family:\"'League Spartan',sans-serif\", size:'16px', weight:'400', tracking:'-0.01em', sample:'Transform your gut health, energy, and sleep with real results.' },\n      { spec:'SPARTAN 400 · 14', family:\"'League Spartan',sans-serif\", size:'14px', weight:'400', tracking:'-0.01em', sample:'Formulations with clinically studied ingredients.' },\n      { spec:'MONO 400 · 11', family:\"'Space Mono',monospace\", size:'12px', weight:'400', tracking:'0.12em', sample:'VIACAP® TECHNOLOGY' },\n    ];\n    const radii = [\n      { name:'sm', val:'8px' },\n      { name:'md', val:'14px' },\n      { name:'lg', val:'22px' },\n      { name:'pill', val:'40px' },\n      { name:'full', val:'50%' },\n    ];\n    const navRows = [\n      { code:'DS-01®', name:'Daily Synbiotic', swatch:'linear-gradient(160deg,#2f3f2a,#14201a)' },\n      { code:'DM-02™', name:'Daily Multivitamin', swatch:'linear-gradient(160deg,#7d8a52,#48571f)' },\n
